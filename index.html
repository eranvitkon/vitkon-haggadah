<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>הגדה משפחת ויתקון</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Frank+Ruhl+Libre:wght@400;700;900&display=swap" rel="stylesheet"/>

<style>
/* ── Reset ─────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:    #F9F5EE;
  --warm:     #F2EAD8;
  --gold:     #B8860B;
  --gold-lt:  #D4A017;
  --ink:      #1A1410;
  --ink-soft: #4A3F35;
  --ink-mute: #8C7B6E;
  --red:      #8B1A1A;
  --border:   #DDD0B8;
  --shadow:   rgba(26,20,16,0.08);
  --radius:   12px;
  --trans:    0.25s ease;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  height: 100%;
  font-family: 'Heebo', sans-serif;
  background: var(--cream);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── Screens ────────────────────────────────────────────────────────────────── */
.screen { display: none; }
.screen.active { display: flex; }

/* ══════════════════════════════════════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════════════════════════════════ */
#loginScreen {
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100dvh;
  padding: calc(1.5rem + var(--safe-top)) 1rem calc(1.5rem + var(--safe-bot));
  overflow-y: auto;
  background: var(--cream);
  background-image: radial-gradient(ellipse 70% 35% at 50% 0%, rgba(184,134,11,0.13) 0%, transparent 70%);
}

.login-card {
  width: 100%;
  max-width: 480px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2rem 1.5rem;
  box-shadow: 0 8px 40px var(--shadow);
  margin: auto 0;
}

.login-logo { text-align: center; margin-bottom: 2rem; }
.login-logo .he-title {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: clamp(1.9rem, 7vw, 2.6rem);
  font-weight: 900;
  color: var(--ink);
  line-height: 1.1;
}
.login-logo .he-sub {
  font-size: 0.9rem;
  color: var(--ink-mute);
  margin-top: 0.4rem;
}
.login-logo .divider {
  width: 48px; height: 2px;
  background: var(--gold);
  margin: 0.9rem auto;
}

.form-label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--ink-soft);
  margin-bottom: 0.45rem;
  letter-spacing: 0.04em;
}
.form-input {
  width: 100%;
  padding: 0.8rem 1rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-family: 'Heebo', sans-serif;
  font-size: 1rem;
  color: var(--ink);
  background: var(--cream);
  transition: border-color var(--trans), box-shadow var(--trans);
  outline: none;
  direction: rtl;
  -webkit-appearance: none;
}
.form-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(184,134,11,0.12);
}

/* Avatar grid — 5 cols on all sizes */
.avatar-section { margin: 1.25rem 0; }
.avatar-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0.5rem;
  margin-top: 0.65rem;
}
.avatar-cell {
  aspect-ratio: 1;
  border-radius: 50%;
  border: 2.5px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: border-color var(--trans), transform var(--trans);
  background: var(--warm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(1.1rem, 4vw, 1.6rem);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.avatar-cell:active { transform: scale(0.93); }
.avatar-cell.selected {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(184,134,11,0.2);
}
.avatar-cell img { width: 100%; height: 100%; object-fit: cover; display: none; }
.avatar-cell img.loaded { display: block; }

.btn-primary {
  width: 100%;
  padding: 1rem;
  background: var(--gold);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: 'Heebo', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 1.25rem;
  transition: background var(--trans);
  letter-spacing: 0.02em;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn-primary:active { background: var(--gold-lt); }

/* ══════════════════════════════════════════════════════════════════════════════
   APP SCREEN — mobile-first full-height layout
══════════════════════════════════════════════════════════════════════════════ */
#appScreen {
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

/* ── Top bar ─────────────────────────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: calc(0.55rem + var(--safe-top)) 0.9rem 0.55rem;
  background: #fff;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 100;
  gap: 0.5rem;
}
.topbar-title {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: clamp(0.85rem, 3.5vw, 1.1rem);
  font-weight: 700;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-shrink: 0;
}
.user-pill {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.25rem 0.55rem 0.25rem 0.3rem;
  background: var(--warm);
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--ink-soft);
  max-width: 110px;
  overflow: hidden;
}
.user-pill span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-pill-avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--border);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  flex-shrink: 0;
}
.user-pill-avatar img { width: 100%; height: 100%; object-fit: cover; }

.btn-logout {
  padding: 0.3rem 0.65rem;
  border: 1.5px solid var(--border);
  background: transparent;
  border-radius: 999px;
  font-family: 'Heebo', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn-logout:active { border-color: var(--red); color: var(--red); }

/* ── Online presence bar ─────────────────────────────────────────────────────── */
.online-bar {
  display: flex;
  align-items: center;
  gap: 0.45rem;
  padding: 0.4rem 0.9rem;
  background: var(--warm);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
}
.online-bar::-webkit-scrollbar { display: none; }
.online-label {
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
  white-space: nowrap;
  flex-shrink: 0;
}
.online-dot {
  width: 6px; height: 6px;
  background: #22C55E;
  border-radius: 50%;
  flex-shrink: 0;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.35; } }
.online-avatars { display: flex; gap: 0.25rem; align-items: center; }
.online-avatar-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  flex-shrink: 0;
}
.online-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid #fff;
  background: var(--border);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  box-shadow: 0 1px 3px var(--shadow);
}
.online-avatar img { width: 100%; height: 100%; object-fit: cover; }
.online-avatar-name {
  font-size: 0.55rem;
  color: var(--ink-mute);
  white-space: nowrap;
  font-weight: 600;
}

/* ── Main layout: sidebar bottom on mobile ──────────────────────────────────── */
.app-body {
  display: flex;
  flex-direction: column-reverse;   /* content on top, nav on bottom */
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── Bottom tab nav (mobile) ─────────────────────────────────────────────────── */
.sidebar {
  display: flex;
  flex-direction: row;
  overflow-x: auto;
  flex-shrink: 0;
  background: #fff;
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bot);
  -webkit-overflow-scrolling: touch;
}
.sidebar::-webkit-scrollbar { display: none; }

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0.5rem 0.75rem;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  border-top: 3px solid transparent;
  transition: all var(--trans);
  white-space: nowrap;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  min-width: 60px;
}
.nav-item:active { background: var(--warm); }
.nav-item.active {
  background: var(--warm);
  border-top-color: var(--gold);
}
.nav-item-number {
  font-size: 0.6rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.04em;
}
.nav-item-title {
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--ink-soft);
  margin-top: 1px;
  text-align: center;
}
.nav-item.active .nav-item-title { color: var(--ink); font-weight: 700; }

/* ── Content scroll area ─────────────────────────────────────────────────────── */
.content {
  flex: 1;
  overflow-y: auto;
  background: var(--cream);
  -webkit-overflow-scrolling: touch;
  min-height: 0;
}
.content::-webkit-scrollbar { display: none; }

/* ── Page ────────────────────────────────────────────────────────────────────── */
.page { display: none; padding: 1.25rem 1rem 2rem; max-width: 680px; margin: 0 auto; }
.page.active { display: block; }

.page-header {
  margin-bottom: 1.25rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
.page-badge {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--gold);
  margin-bottom: 0.3rem;
}
.page-title {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: clamp(1.5rem, 6vw, 2rem);
  font-weight: 900;
  color: var(--ink);
  line-height: 1.15;
}
.page-subtitle {
  font-size: 0.85rem;
  color: var(--ink-mute);
  margin-top: 0.25rem;
}

/* Text blocks */
.text-block {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1.25rem;
  margin-bottom: 1rem;
  font-size: 0.95rem;
  line-height: 1.9;
  color: var(--ink-soft);
  direction: rtl;
  text-align: right;
}
.text-block.family-note {
  background: var(--warm);
  border-color: rgba(184,134,11,0.25);
  font-style: italic;
}
.text-block .emoji-lead { font-style: normal; font-size: 1.1em; }

/* Prayer text */
.prayer-text {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: clamp(1rem, 3.5vw, 1.1rem);
  line-height: 2;
  color: var(--ink);
  text-align: center;
  direction: rtl;
}

/* Page image */
.page-image-wrap {
  width: 100%;
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 1rem;
  background: var(--warm);
  border: 1px solid var(--border);
}
.page-img {
  width: 100%;
  display: block;
  object-fit: cover;
  max-height: 300px;
}

/* ── Per-page upload section ─────────────────────────────────────────────────── */
.page-upload-section { margin-top: 1.25rem; }
.page-upload-trigger { cursor: pointer; }

.upload-zone {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.85rem;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  font-size: 0.85rem;
  color: var(--ink-mute);
  transition: all var(--trans);
  background: #fff;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.upload-zone:active { border-color: var(--gold); color: var(--gold); background: var(--warm); }

.page-photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 0.55rem;
  margin-top: 0.65rem;
}
.page-photo-card {
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--warm);
  border: 1px solid var(--border);
  position: relative;
  cursor: zoom-in;
}
.page-photo-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
}
.page-photo-owner {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.65));
  padding: 0.5rem 0.4rem 0.3rem;
  display: flex;
  align-items: center;
  gap: 0.25rem;
  direction: rtl;
}
.page-photo-owner-avatar {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  overflow: hidden;
  flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,0.5);
}
.page-photo-owner-avatar img { width: 100%; height: 100%; object-fit: cover; }
.page-photo-owner-name {
  font-size: 0.62rem;
  color: #fff;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Lightbox ────────────────────────────────────────────────────────────────── */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.lightbox.open { display: flex; }
.lightbox img { max-width: 95vw; max-height: 90dvh; border-radius: var(--radius); }
.lightbox-close {
  position: absolute;
  top: calc(1rem + var(--safe-top));
  right: 1rem;
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  font-size: 1.5rem;
  cursor: pointer;
  line-height: 1;
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Toast ───────────────────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: calc(4.5rem + var(--safe-bot));
  left: 50%;
  transform: translateX(-50%) translateY(120%);
  background: var(--ink);
  color: #fff;
  padding: 0.6rem 1.1rem;
  border-radius: 999px;
  font-size: 0.82rem;
  font-weight: 600;
  z-index: 2000;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Connection badge ────────────────────────────────────────────────────────── */
.conn-badge {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #EF4444;
  flex-shrink: 0;
  transition: background var(--trans);
}
.conn-badge.connected { background: #22C55E; }

/* ── Desktop override (wider screens) ───────────────────────────────────────── */
@media (min-width: 700px) {
  .app-body { flex-direction: row; }
  .sidebar {
    flex-direction: column;
    width: 180px;
    overflow-y: auto;
    overflow-x: hidden;
    border-top: none;
    border-left: 1px solid var(--border);
    padding-bottom: 0;
  }
  .nav-item {
    flex-direction: column;
    align-items: flex-end;
    padding: 0.65rem 1rem;
    border-top: none;
    border-right: 3px solid transparent;
    min-width: unset;
  }
  .nav-item.active { border-top-color: transparent; border-right-color: var(--gold); }
  .page { padding: 2rem 1.5rem 3rem; }
  .page-img { max-height: 420px; }
  .toast { bottom: 1.5rem; }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════════════════
     LOGIN SCREEN
     ══════════════════════════════════════════════════════════════════════════ -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="login-logo">
      <div class="he-title">הגדה של פסח</div>
      <div class="he-sub">משפחת ויתקון • תשפ״ה</div>
      <div class="divider"></div>
    </div>

    <label class="form-label" for="nameInput">השם שלך</label>
    <input class="form-input" id="nameInput" type="text" placeholder="הקלד את שמך..." maxlength="20" autocomplete="off"/>

    <div class="avatar-section">
      <div class="form-label">בחר תמונה</div>
      <div class="avatar-grid" id="avatarGrid"></div>
    </div>

    <button class="btn-primary" id="loginBtn">כניסה לסדר פסח ✡</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════
     APP SCREEN
     ══════════════════════════════════════════════════════════════════════════ -->
<div id="appScreen" class="screen">

  <!-- Top bar -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:0.6rem;">
      <div class="conn-badge" id="connBadge"></div>
      <span class="topbar-title">הגדה לבית משפחת ויתקון</span>
    </div>
    <div class="topbar-right">
      <div class="user-pill" id="userPill">
        <div class="user-pill-avatar" id="topbarAvatar"></div>
        <span id="topbarName"></span>
      </div>
      <button class="btn-logout" id="logoutBtn">יציאה</button>
    </div>
  </div>

  <!-- Online presence bar -->
  <div class="online-bar">
    <div class="online-dot"></div>
    <span class="online-label">מחוברים עכשיו</span>
    <div class="online-avatars" id="onlineAvatars">
      <span style="font-size:0.78rem;color:var(--ink-mute);">טוען...</span>
    </div>
  </div>

  <!-- Body: sidebar + content -->
  <div class="app-body">

    <!-- Sidebar navigation -->
    <nav class="sidebar" id="sidebar"></nav>

    <!-- Page content -->
    <main class="content" id="contentArea"></main>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>


<script>
// ══════════════════════════════════════════════════════════════════════════════
//  CONFIG

  { id: 10, src: '/images/avatar-10.jpg', emoji: '🐿️' },

  { id: 14, src: '/images/avatar-14.jpg', emoji: '👩‍🦳' },
  { id: 15, src: '/images/avatar-15.jpg', emoji: '🧕' },
];

const PAGES = [
  {
    id: 'kadesh',
    number: '01',
    title: 'קדש',
    subtitle: 'הכוס הראשונה',
    content: `
      <div class="text-block">

// ══════════════════════════════════════════════════════════════════════════════
//  STATE
//  STATE
// ══════════════════════════════════════════════════════════════════════════════
let state = {
  user: null,       // { name, avatar }
  ws: null,
  users: [],
  photos: [],
  currentPage: 'kadesh'
};

// ══════════════════════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function avatarEl(avatarId, size = 32) {
  const av = AVATARS.find(a => a.id === avatarId) || AVATARS[0];
  const div = document.createElement('div');
  div.style.cssText = `width:${size}px;height:${size}px;border-radius:50%;background:var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:${size * 0.5}px;flex-shrink:0;`;
  const img = document.createElement('img');
  img.src = av.src;
  img.alt = '';
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:none;';
  img.onload = () => { img.style.display = 'block'; div.querySelector('.fallback').style.display = 'none'; };
  const fallback = document.createElement('span');
  fallback.className = 'fallback';
  fallback.textContent = av.emoji;
  div.appendChild(img);
  div.appendChild(fallback);
  return div;
}

// ══════════════════════════════════════════════════════════════════════════════
//  BUILD LOGIN AVATAR GRID
// ══════════════════════════════════════════════════════════════════════════════
let selectedAvatar = 1;

function buildAvatarGrid() {
  const grid = document.getElementById('avatarGrid');
  AVATARS.forEach(av => {
    const cell = document.createElement('div');
    cell.className = 'avatar-cell' + (av.id === 1 ? ' selected' : '');
    cell.title = av.emoji;

    const img = document.createElement('img');
    img.src = av.src;
    img.alt = av.emoji;
    img.onload = () => img.classList.add('loaded');

    const emoji = document.createElement('span');
    emoji.textContent = av.emoji;

    cell.appendChild(img);
    cell.appendChild(emoji);

    cell.addEventListener('click', () => {
      document.querySelectorAll('.avatar-cell').forEach(c => c.classList.remove('selected'));
      cell.classList.add('selected');
      selectedAvatar = av.id;
    });

    grid.appendChild(cell);
  });
}

// ══════════════════════════════════════════════════════════════════════════════
//  BUILD HAGGADAH PAGES
// ══════════════════════════════════════════════════════════════════════════════
function buildPages() {
  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('contentArea');
  sidebar.innerHTML = '';
  content.innerHTML = '';

  PAGES.forEach((page, idx) => {
    // Nav item
    const navItem = document.createElement('div');
    navItem.className = 'nav-item' + (idx === 0 ? ' active' : '');
    navItem.dataset.page = page.id;
    navItem.innerHTML = `
      <span class="nav-item-number">${page.number}</span>
      <span class="nav-item-title">${page.title}</span>
    `;
    navItem.addEventListener('click', () => navigateTo(page.id));
    sidebar.appendChild(navItem);

    // Page content
    const pageDiv = document.createElement('div');
    pageDiv.className = 'page' + (idx === 0 ? ' active' : '');
    pageDiv.id = 'page-' + page.id;
    pageDiv.innerHTML = `
      <div class="page-header">
        <div class="page-badge">${page.number}</div>
        <div class="page-title">${page.title}</div>
        <div class="page-subtitle">${page.subtitle}</div>
      </div>
      ${page.content}
    `;
    content.appendChild(pageDiv);
  });
}

function navigateTo(pageId) {
  state.currentPage = pageId;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === pageId));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + pageId));
}

// ══════════════════════════════════════════════════════════════════════════════
//  RENDER ONLINE BAR
// ══════════════════════════════════════════════════════════════════════════════
function renderOnlineBar() {
  const container = document.getElementById('onlineAvatars');
  container.innerHTML = '';
  if (state.users.length === 0) {
    container.innerHTML = '<span style="font-size:0.78rem;color:var(--ink-mute);">אין מחוברים</span>';
    return;
  }
  state.users.forEach(user => {
    const wrap = document.createElement('div');
    wrap.className = 'online-avatar-wrap';

    const av = document.createElement('div');
    av.className = 'online-avatar';
    av.appendChild(avatarEl(user.avatar, 28));

    const name = document.createElement('div');
    name.className = 'online-avatar-name';
    name.textContent = user.name;

    wrap.appendChild(av);
    wrap.appendChild(name);
    container.appendChild(wrap);
  });
}

// ══════════════════════════════════════════════════════════════════════════════
//  RENDER PER-PAGE PHOTOS
// ══════════════════════════════════════════════════════════════════════════════
function renderAllPagePhotos() {
  // Find all page photo grids currently in the DOM and re-render each
  document.querySelectorAll('.page-photo-grid').forEach(grid => {
    const pageId = grid.id.replace('photos-', '');
    renderPagePhotos(pageId);
  });
}

function renderPagePhotos(pageId) {
  const grid = document.getElementById('photos-' + pageId);
  if (!grid) return;
  const pagePhotos = state.photos.filter(p => p.pageId === pageId);
  grid.innerHTML = '';
  pagePhotos.forEach(photo => {
    const card = document.createElement('div');
    card.className = 'page-photo-card';

    const img = document.createElement('img');
    img.src = photo.url;
    img.alt = '';
    img.addEventListener('click', () => openLightbox(photo.url));

    // Owner strip with avatar
    const ownerStrip = document.createElement('div');
    ownerStrip.className = 'page-photo-owner';

    const avWrap = document.createElement('div');
    avWrap.className = 'page-photo-owner-avatar';
    const av = AVATARS.find(a => a.id === photo.avatarId) || AVATARS[0];
    const avImg = document.createElement('img');
    avImg.src = av.src;
    avImg.alt = av.emoji;
    avImg.onerror = function() {
      this.style.display = 'none';
      avWrap.textContent = av.emoji;
    };
    avWrap.appendChild(avImg);

    const nameEl = document.createElement('span');
    nameEl.className = 'page-photo-owner-name';
    nameEl.textContent = photo.uploadedBy;

    ownerStrip.appendChild(avWrap);
    ownerStrip.appendChild(nameEl);
    card.appendChild(img);
    card.appendChild(ownerStrip);
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════════════════════════════
//  LIGHTBOX
// ══════════════════════════════════════════════════════════════════════════════
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightboxClose').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox'))
    document.getElementById('lightbox').classList.remove('open');
});

// ══════════════════════════════════════════════════════════════════════════════
//  PER-PAGE PHOTO UPLOAD
// ══════════════════════════════════════════════════════════════════════════════
// Delegate: listen on document for any page-photo-input change
document.addEventListener('change', async (e) => {
  if (!e.target.classList.contains('page-photo-input')) return;
  const file = e.target.files[0];
  if (!file || !state.user) return;

  // Find which page this upload belongs to
  const section = e.target.closest('.page-upload-section');
  const pageId = section ? section.dataset.pageid : 'general';

  const form = new FormData();
  form.append('photo', file);
  form.append('name', state.user.name);
  form.append('avatarId', state.user.avatar);
  form.append('pageId', pageId);

  showToast('מעלה תמונה...');
  try {
    const res = await fetch('/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (data.ok) showToast('התמונה הועלתה! 📸');
    else showToast('שגיאה בהעלאה');
  } catch {
    showToast('שגיאה בהעלאה');
  }
  e.target.value = '';
});

// ══════════════════════════════════════════════════════════════════════════════
//  WEBSOCKET
// ══════════════════════════════════════════════════════════════════════════════
function connectWS() {
  if (!location.host) {
    console.warn('No server host — WebSocket skipped. Open via your Node server, not as a local file.');
    showToast('הפעל את השרת לחיבור בזמן אמת');
    return;
  }
  try {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}`);
    state.ws = ws;

    ws.addEventListener('open', () => {
      document.getElementById('connBadge').classList.add('connected');
      if (state.user) {
        ws.send(JSON.stringify({ type: 'login', name: state.user.name, avatar: state.user.avatar }));
      }
    });

    ws.addEventListener('message', (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') {
        state.users = msg.users;
        state.photos = msg.photos;
        renderOnlineBar();
        renderPhotoWall();
      }
      if (msg.type === 'force_logout') {
        doLogout(true);
        showToast('המנהל איפס את האפליקציה', 4000);
      }
    });

    ws.addEventListener('close', () => {
      document.getElementById('connBadge').classList.remove('connected');
      if (state.user) setTimeout(connectWS, 3000);
    });

    ws.addEventListener('error', (err) => {
      console.warn('WebSocket error:', err);
    });
  } catch (err) {
    console.warn('WebSocket failed:', err);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  LOGIN / LOGOUT
// ══════════════════════════════════════════════════════════════════════════════
function doLogin(name, avatarId) {
  state.user = { name, avatar: avatarId };

  // Update topbar
  document.getElementById('topbarName').textContent = name;
  const avatarContainer = document.getElementById('topbarAvatar');
  avatarContainer.innerHTML = '';
  avatarContainer.appendChild(avatarEl(avatarId, 26));

  // Switch screens
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');

  // Build pages
  buildPages();

  // Connect WS (will send login on open)
  connectWS();
}

function doLogout(forced = false) {
  if (state.ws && state.ws.readyState === WebSocket.OPEN) {
    if (!forced) state.ws.send(JSON.stringify({ type: 'logout' }));
    state.ws.close();
  }
  state.user = null;
  state.ws = null;
  state.users = [];
  state.photos = [];
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
}

document.getElementById('loginBtn').addEventListener('click', () => {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showToast('נא להזין שם'); return; }
  doLogin(name, selectedAvatar);
});

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

document.getElementById('logoutBtn').addEventListener('click', () => doLogout(false));

// ══════════════════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════════════════
buildAvatarGrid();
</script>
